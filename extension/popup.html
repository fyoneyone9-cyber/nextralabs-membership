<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* 🎨 NEXTRA MASTER UI - STRRICT MODE */
    html, body {
      width: 300px !important;
      margin: 0 !important;
      padding: 0 !important;
      background-color: #050507 !important;
      font-family: 'Segoe UI', sans-serif !important;
    }
    .wrapper {
      padding: 20px !important;
      background-color: #050507 !important;
    }
    .header {
      text-align: center !important;
      margin-bottom: 20px !important;
      border-bottom: 1px solid #1e293b !important;
      padding-bottom: 15px !important;
    }
    .logo {
      font-size: 22px !important;
      font-weight: 900 !important;
      color: #ffffff !important;
      font-style: italic !important;
      text-transform: uppercase !important;
      margin: 0 !important;
    }
    .badge {
      background-color: #10b981 !important;
      color: #000000 !important;
      font-size: 9px !important;
      padding: 2px 10px !important;
      border-radius: 99px !important;
      text-transform: uppercase !important;
      font-weight: 900 !important;
      display: inline-block !important;
      margin-top: 5px !important;
    }
    .tool-list {
      display: flex !important;
      flex-direction: column !important;
      gap: 12px !important;
    }
    .tool-item {
      display: flex !important;
      align-items: center !important;
      gap: 15px !important;
      padding: 15px !important;
      background-color: #13141f !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 16px !important;
      cursor: pointer !important;
      text-decoration: none !important;
      transition: all 0.2s !important;
    }
    .tool-item:hover {
      border-color: #10b981 !important;
      background-color: #1a1b26 !important;
    }
    .icon {
      font-size: 20px !important;
      background: rgba(16, 185, 129, 0.1) !important;
      width: 40px !important;
      height: 40px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      border-radius: 10px !important;
    }
    .tool-name {
      font-size: 14px !important;
      font-weight: 800 !important;
      color: #f8fafc !important;
      font-style: italic !important;
      text-transform: uppercase !important;
    }
    .footer {
      text-align: center !important;
      font-size: 9px !important;
      color: #475569 !important;
      margin-top: 20px !important;
      letter-spacing: 0.3em !important;
      font-weight: 700 !important;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1 class="logo">NextraLabs</h1>
      <span class="badge">Master Launcher</span>
    </div>
    
    <div class="tool-list">
      <div class="tool-item" id="inbox">
        <div class="icon">📧</div>
        <div class="tool-name">Gmail AI Accelerator</div>
      </div>
      <div class="tool-item" id="staysee">
        <div class="icon">🏨</div>
        <div class="tool-name">Staysee AI Finder</div>
      </div>
      <div class="tool-item" id="money">
        <div class="icon">🛡️</div>
        <div class="tool-name">AI家計防衛</div>
      </div>
      <div class="tool-item" id="sidejob">
        <div class="icon">🚀</div>
        <div class="tool-name">AI副業</div>
      </div>
    </div>

    <div class="footer">OPERATIONAL OS • 2026</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
